name: Keep backend alive

# Ping le backend Render toutes les 14 minutes pour eviter qu'il s'endorme.
# Le plan gratuit Render met les services en veille apres 15 min d'inactivite.
# En pingant juste avant cette limite, le serveur reste toujours reveille.

on:
  schedule:
    # GitHub Actions cron : "*/14 * * * *" = toutes les 14 minutes (UTC)
    - cron: '*/14 * * * *'
  # Permet aussi de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /api/health
        run: |
          echo "Ping de https://autoloc-api.onrender.com/api/health"
          # -f : echec si HTTP error
          # --max-time 60 : attendre jusqu'a 60s (cas du cold start)
          # --retry 3 : retry 3 fois en cas d'echec reseau
          # -s : silencieux (pas de barre de progres)
          # -o /dev/null : pas d'output
          # -w : afficher uniquement le statut HTTP + temps
          curl -f -s -o /dev/null \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            -w "HTTP %{http_code} - duree %{time_total}s\n" \
            https://autoloc-api.onrender.com/api/health
